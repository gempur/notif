{% extends "base.html" %}

{% block title %}Beranda — Notifikasi{% endblock %}

{% block content %}
<div class="rounded-2xl bg-white p-10 shadow-lg text-center">
  <h1 class="text-4xl font-bold text-slate-900">Notifikasi</h1>
  <p class="mt-3 text-lg text-slate-600">Praktek EDA dengan RabbitMQ</p>
  <button id="btnInfo" class="mt-8 rounded-lg bg-slate-900 px-5 py-2.5 text-white hover:bg-slate-700 transition">
    Klik Saya
  </button>
  <p id="infoText" class="mt-4 text-sm text-slate-500 hidden">jQuery aktif dan siap dipakai.</p>
</div>
{% endblock %}

{% block scripts %}
<script>
  $("#btnInfo").on("click", function () {
    $("#infoText").toggleClass("hidden");
  });
</script>
{% endblock %}
